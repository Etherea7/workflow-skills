name: ci
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: astral-sh/setup-uv@v6
      - name: Format gate (Agent Skills spec + suite conventions)
        run: bash scripts/validate.sh
      - name: Catalog routing preflight
        run: node scripts/run-routing-evals.mjs
      - name: Deterministic workflow tests
        run: node scripts/run-deterministic-tests.mjs
      - name: Shell syntax
        run: |
          for f in install.sh scripts/*.sh skills/*/scripts/*.sh; do
            bash -n "$f"
          done
      - name: Installer ownership and rollback safety
        run: node evals/install/installer-safety-test.mjs

  # Behavior evals per skill are run locally during milestone gates (they need
  # a live agent); CI covers structure, lexical routing, and deterministic contracts.
